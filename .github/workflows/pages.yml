name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          A57B2C: ${{ secrets.A57B2C }}
          B90AB7: ${{ secrets.B90AB7 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A57B2C', '')
          bm = os.environ.get('B90AB7', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- c1b1958657c04c6e176a45923fbf2c97f5811d -->', gm)
              s2 = s2.replace('<!-- 9d9d7dc69397ddd2b9a3eeac7bab7fcf -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
